<!DOCTYPE html>
<html>
<head>
  <title>MLB Cycle</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1c2c;
      color: white;
      text-align: center;
      padding: 40px;
    }

    input {
      padding: 10px;
      width: 300px;
    }

    .suggestions {
      background: white;
      color: black;
      width: 300px;
      margin: auto;
      text-align: left;
      border-radius: 5px;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #eee;
    }
  </style>
</head>

<body>

<h1>MLB Cycle</h1>
<p>Pick players for today's hits</p>

<div>
  <h3>Home Run</h3>
  <input id="hr" oninput="searchPlayers(this.value, 'hr')" placeholder="Start typing a player...">
  <div id="hr-suggestions" class="suggestions"></div>
</div>

<script>
let players = [];

// Fetch MLB players
fetch("https://statsapi.mlb.com/api/v1/sports/1/players?season=2024")
  .then(res => res.json())
  .then(data => {
    players = data.people;
    console.log("Players loaded:", players.length);
  });

// Search function
function searchPlayers(query, type) {
  const box = document.getElementById(type + "-suggestions");
  box.innerHTML = "";

  if (!query) return;

  const results = players
    .filter(p => p.fullName.toLowerCase().includes(query.toLowerCase()))
    .slice(0, 5);

  results.forEach(player => {
    const div = document.createElement("div");
    div.innerText = player.fullName + " (" + player.currentTeam?.name + ")";
    div.onclick = () => {
      document.getElementById(type).value = player.fullName;
      box.innerHTML = "";
    };
    box.appendChild(div);
  });
}
</script>

</body>
</html>
