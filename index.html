<!DOCTYPE html>
<html>
<head>
  <title>MLB Cycle</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1c2c;
      color: white;
      text-align: center;
      padding: 40px;
    }

    input {
      padding: 10px;
      width: 300px;
    }

    .suggestions {
      background: white;
      color: black;
      width: 300px;
      margin: auto;
      text-align: left;
      border-radius: 5px;
    }

    .suggestions div {
      padding: 8px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #eee;
    }
  </style>
</head>

<body>

<h1>MLB Cycle</h1>
<p>Pick players for today's hits</p>

<div>

<h3>Single</h3>
<input id="single" oninput="searchPlayers(this.value, 'single')" placeholder="Start typing...">
<div id="single-suggestions" class="suggestions"></div>

<h3>Double</h3>
<input id="double" oninput="searchPlayers(this.value, 'double')" placeholder="Start typing...">
<div id="double-suggestions" class="suggestions"></div>

<h3>Triple</h3>
<input id="triple" oninput="searchPlayers(this.value, 'triple')" placeholder="Start typing...">
<div id="triple-suggestions" class="suggestions"></div>

<h3>Home Run</h3>
<input id="hr" oninput="searchPlayers(this.value, 'hr')" placeholder="Start typing...">
<div id="hr-suggestions" class="suggestions"></div>

<h3>Walk</h3>
<input id="walk" oninput="searchPlayers(this.value, 'walk')" placeholder="Start typing...">
<div id="walk-suggestions" class="suggestions"></div>

<br><br>
<button onclick="scorePicks()">Score My Picks</button>

<h2 id="score">Score: --</h2>
  
<script>
let players = [];

  async function scorePicks() {
  const picks = {
    single: document.getElementById("single").value,
    double: document.getElementById("double").value,
    triple: document.getElementById("triple").value,
    hr: document.getElementById("hr").value,
    walk: document.getElementById("walk").value
  };

  let totalScore = 0;

  // Get today's games
  const today = new Date().toISOString().split("T")[0];

  const scheduleRes = await fetch(
    `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${today}`
  );
  const scheduleData = await scheduleRes.json();

  const games = scheduleData.dates?.[0]?.games || [];

  // Loop through games and get boxscores
  for (let game of games) {
    const gamePk = game.gamePk;

    const boxRes = await fetch(
      `https://statsapi.mlb.com/api/v1/game/${gamePk}/boxscore`
    );
    const boxData = await boxRes.json();

    const teams = boxData.teams;

    // Check both teams
    for (let side of ["away", "home"]) {
      const players = teams[side].players;

      for (let id in players) {
        const p = players[id].stats?.batting;

        if (!p) continue;

        const name = players[id].person.fullName;

        // SCORING RULES (simple version)
        function checkTeamStat(players, statKey) {
  let found = false;

  for (let id in players) {
    const p = players[id].stats?.batting;
    if (!p) continue;
    if (p[statKey] > 0) {
      found = true;
      break;
    }
  }

  return found;
}

function checkPlayer(players, playerName, statKey) {
  for (let id in players) {
    const p = players[id].stats?.batting;
    if (!p) continue;

    const name = players[id].person.fullName;

    if (name === playerName && p[statKey] > 0) {
      return true;
    }
  }
  return false;
}

// scoring map
const scoring = [
  { key: "hits", pick: picks.single, full: 10, partial: 3 },
  { key: "doubles", pick: picks.double, full: 20, partial: 6 },
  { key: "triples", pick: picks.triple, full: 30, partial: 10 },
  { key: "homeRuns", pick: picks.hr, full: 40, partial: 15 },
  { key: "baseOnBalls", pick: picks.walk, full: 5, partial: 2 }
];

for (let game of games) {
  const gamePk = game.gamePk;

  const boxRes = await fetch(
    `https://statsapi.mlb.com/api/v1/game/${gamePk}/boxscore`
  );
  const boxData = await boxRes.json();

  const teams = boxData.teams;

  for (let side of ["away", "home"]) {
    const players = teams[side].players;

    for (let rule of scoring) {
      const playerHit = checkPlayer(players, rule.pick, rule.key);

      if (playerHit) {
        totalScore += rule.full;
      } else {
        const teamHit = checkTeamStat(players, rule.key);
        if (teamHit) {
          totalScore += rule.partial;
        }
      }
    }
  }
}
      }
    }
  }

  document.getElementById("score").innerText = `Score: ${totalScore}`;
}
// Fetch MLB players
fetch("https://statsapi.mlb.com/api/v1/sports/1/players?season=2024")
  .then(res => res.json())
  .then(data => {
    players = data.people;
    console.log("Players loaded:", players.length);
  });

// Search function
function searchPlayers(query, type) {
  const box = document.getElementById(type + "-suggestions");
  box.innerHTML = "";

  if (!query) return;

  const results = players
    .filter(p => p.fullName.toLowerCase().includes(query.toLowerCase()))
    .slice(0, 5);

  results.forEach(player => {
    const div = document.createElement("div");
    div.innerText = player.fullName + " (" + player.currentTeam?.name + ")";
    div.onclick = () => {
      document.getElementById(type).value = player.fullName;
      box.innerHTML = "";
    };
    box.appendChild(div);
  });
}
</script>

</body>
</html>
